{% extends "base.html" %}

{% block contenu %}
<section>
  <h2>Nuage de mots</h2>

  <form method="get" action="{{ url_for('nuage') }}">
    <label>
      Publication debut
      <input type="date" name="date_debut" value="{{ date_debut }}">
    </label>

    <label>
      Publication fin
      <input type="date" name="date_fin" value="{{ date_fin }}">
    </label>

    <label>
      Nombre de mots
      <input type="number" name="nombre" value="{{ nombre }}" min="1" max="100">
    </label>

    <button type="submit">Generer</button>
  </form>
</section>

<section>
  <h2>Resultat SVG</h2>
  <div class="svg-resultat">
    {{ svg|safe }}
  </div>
  <p>
    <a href="{{ url_for('telecharger_nuage', date_debut=date_debut, date_fin=date_fin, nombre=nombre) }}">Telecharger le SVG</a>
  </p>
</section>

<section>
  <h2>Mots retenus</h2>
  {% if frequences %}
    <table>
      <thead>
        <tr>
          <th>Mot</th>
          <th>Frequence</th>
        </tr>
      </thead>
      <tbody>
        {% for mot, frequence in frequences %}
          <tr>
            <td>{{ mot }}</td>
            <td>{{ frequence }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>Aucun mot trouve.</p>
  {% endif %}
</section>
{% endblock %}
